<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout E-Commerce</title>

    <link rel="stylesheet" href="grid.css">
</head>

<body>

    <!-- Main Layout -->

    <div class="container">

        <!-- Header -->

        <header>
            HEADER
        </header>

        <!-- Hero -->

        <section class="hero">
            HERO BANNER
        </section>

        <!-- Sidebar -->

        <aside class="sidebar">

            <h2>Bộ lọc</h2>

            <label>
                <input type="checkbox">
                Điện thoại
            </label>

            <label>
                <input type="checkbox">
                Laptop
            </label>

            <label>
                <input type="checkbox">
                Gaming
            </label>

            <label>
                <input type="checkbox">
                Phụ kiện
            </label>

        </aside>

        <!-- Main Content -->

        <main class="main-content">

            <div class="product featured">
                <img src="https://via.placeholder.com/300x150" alt="">
                <h3>Sản phẩm nổi bật</h3>
                <p>2.500.000đ</p>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/300x150" alt="">
                <h3>Sản phẩm 1</h3>
                <p>500.000đ</p>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/300x150" alt="">
                <h3>Sản phẩm 2</h3>
                <p>650.000đ</p>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/300x150" alt="">
                <h3>Sản phẩm 3</h3>
                <p>800.000đ</p>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/300x150" alt="">
                <h3>Sản phẩm 4</h3>
                <p>1.000.000đ</p>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/300x150" alt="">
                <h3>Sản phẩm 5</h3>
                <p>1.500.000đ</p>
            </div>

        </main>

        <!-- Ads -->

        <aside class="ads">

            <h2>Quảng cáo</h2>

            <img src="https://via.placeholder.com/180x400" alt="">

        </aside>

        <!-- Footer -->

        <footer>
            FOOTER
        </footer>

    </div>

</body>

</html>
